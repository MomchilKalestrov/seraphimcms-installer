name: Build project for Release

on:
  release:
    types: [ published ]

permissions:
  contents: write

jobs:
  build-project-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build project
        uses: egor-tensin/setup-mingw@v3
        run: |
          npm i <<< linux
          npm run publish:linux
          npm i <<< win32
          npm run publish:windows

      - name: Upload project to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            publish/seraphimcms-linux-installer,
            publish/seraphimcms-windows-installer.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}