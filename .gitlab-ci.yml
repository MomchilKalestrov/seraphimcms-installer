stages:
  - auto-create-release
  - build-release
  - publish-build
  - update-github-mirror

auto-create-release:
  stage: auto-create-release
  image: ubuntu:latest
  only:
    - master
  before_script:
    - apt-get update && apt-get install -y git
    - git config user.name "gitlab-ci"
    - git config user.email "gitlab-ci@gitlab.com"
  script:
    - DATE_TAG=$(date +v%Y.%m.%d-%H%M)
    - "echo Generated tag: $DATE_TAG"
    - echo "DATE_TAG=$DATE_TAG" > release.env
    - git tag $DATE_TAG
    - git push https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git $DATE_TAG
  artifacts:
    reports:
      dotenv: release.env

build-release:
  stage: build-release
  image: ubuntu:latest
  only:
    - master
  parallel:
    matrix:
      - PLATFORM: [ win32, linux ]
  before_script:
    - apt-get update && apt-get install -y git curl make $(if [ "$PLATFORM" = "win32" ]; then echo "mingw-w64"; else echo "gcc"; fi)
    - curl -fsSL https://deb.nodesource.com/setup_24.x | bash -
    - apt-get install -y nodejs
  script:
    - npm i <<< $PLATFORM
    - npm run publish:$PLATFORM
  artifacts:
    paths:
      - publish/

publish-build:
  stage: publish-build
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  only:
    - master
  script:
    - echo "Creating release for $DATE_TAG"
  release:
    tag_name: $DATE_TAG
    name: 'Release $DATE_TAG'
    description: 'Automated release for $DATE_TAG'
    assets:
      links:
        - name: seraphimcms-linux-installer
          url: https://$CI_SERVER_HOST/$CI_PROJECT_PATH/-/jobs/artifacts/$CI_COMMIT_REF_NAME/raw/publish/seraphimcms-linux-installer?job=build-release%3A%20%5Blinux%5D
          link_type: other
        - name: seraphimcms-win32-installer.exe
          url: https://$CI_SERVER_HOST/$CI_PROJECT_PATH/-/jobs/artifacts/$CI_COMMIT_REF_NAME/raw/publish/seraphimcms-win32-installer.exe?job=build-release%3A%20%5Bwin32%5D
          link_type: other

update-github-mirror:
  stage: update-github-mirror
  image: ubuntu:latest
  only:
    - master
  before_script:
    - apt-get update && apt-get install -y git
  script:
    - git remote add github https://MomchilKalestrov:${GITHUB_MIRROR_TOKEN}@github.com/MomchilKalestrov/seraphimcms-installer.git
    - git push github HEAD:master --force